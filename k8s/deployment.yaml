apiVersion: apps/v1
kind: Deployment
metadata:
  name: tourism-website-deployment
  labels:
    app: tourism-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tourism-website
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: tourism-website
    spec:
      containers:
      - name: tourism-website
        image: tourism-website:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
